steps:
  # Build frontend image — Dockerfile lives at frontend/Dockerfile,
  # context is the frontend/ directory (all COPY paths are relative to it)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pragmalogixai/frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_BASE_URL=https://pragmalogixai-backend-eah62ip3iq-uc.a.run.app'
      - 'frontend'       # <-- build context is frontend/ subdirectory

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pragmalogixai/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
